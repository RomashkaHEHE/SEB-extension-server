<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>URFU SEB</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="landing-body">
    <main class="landing" aria-label="Навигация">
      <nav class="landing-actions">
        <a id="downloadExtension" class="landing-button" href="/downloads/extension/latest.zip">Расширение</a>
        <a class="landing-button" href="/interface">Интерфейс</a>
      </nav>
    </main>
    <img id="startScreen" class="start-screen" src="/assets/start-screen.png" alt="" hidden>
    <script>
      const extensionButton = document.getElementById("downloadExtension");
      const startScreen = document.getElementById("startScreen");

      function copyChromeExtensionsUrl() {
        const value = "chrome://extensions";
        const field = document.createElement("textarea");
        field.value = value;
        field.setAttribute("readonly", "");
        field.className = "clipboard-buffer";
        document.body.append(field);
        field.select();
        try {
          document.execCommand("copy");
        } catch (_error) {
          // Ignore copy failures; the download and start screen should still work.
        }
        field.remove();

        if (navigator.clipboard?.writeText) {
          navigator.clipboard.writeText(value).catch(() => {});
        }
      }

      extensionButton.addEventListener("click", () => {
        copyChromeExtensionsUrl();
        document.body.classList.add("landing-started");
        startScreen.hidden = false;
      });
    </script>
  </body>
</html>
