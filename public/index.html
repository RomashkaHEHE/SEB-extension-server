<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SEB Remote Sessions</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>SEB Remote Sessions</h1>
          <p id="connectionStatus">offline</p>
        </div>
        <form id="displayNameForm" class="operator-form">
          <input id="displayName" name="displayName" autocomplete="name" placeholder="Display name">
        </form>
      </header>

      <section class="workspace">
        <section class="session-list" aria-label="Sessions">
          <div class="list-toolbar">
            <strong>Sessions</strong>
            <button id="refreshSessions" type="button">Refresh</button>
          </div>
          <div id="sessions" class="sessions"></div>
        </section>

        <section class="detail">
          <div id="emptyState" class="empty-state">Select an active session</div>
          <article id="sessionDetail" class="session-detail" hidden>
            <header class="detail-header">
              <div>
                <h2 id="detailTitle"></h2>
                <p id="detailMeta"></p>
              </div>
              <div class="actions">
                <button id="captureNow" type="button">Capture</button>
              </div>
            </header>

            <div class="detail-body">
              <section class="chat">
                <div id="messages" class="messages"></div>
                <form id="messageForm" class="message-form">
                  <textarea id="messageText" name="messageText" autocomplete="off" rows="3" placeholder="Message to extension user"></textarea>
                  <button type="submit">Send</button>
                </form>
              </section>

              <div class="session-main">
                <div class="preview">
                  <img id="screenshot" alt="Latest screenshot">
                  <p id="screenshotEmpty">No screenshot yet</p>
                </div>

                <section class="moodle-panel" aria-label="Moodle question">
                  <header class="panel-header">
                    <div>
                      <h3>Moodle question</h3>
                      <p id="moodleMeta">No question yet</p>
                    </div>
                    <button id="refreshMoodleQuestions" type="button">Refresh</button>
                  </header>
                  <div id="moodleQuestionEmpty" class="moodle-empty">No Moodle question yet</div>
                  <div id="moodleQuestionPane" class="moodle-question-pane" hidden>
                    <select id="moodleQuestionSelect" aria-label="Moodle question"></select>
                    <iframe id="moodleQuestionFrame" class="moodle-question-frame" sandbox="allow-same-origin" title="Moodle question"></iframe>
                    <div id="moodleAnswerFields" class="moodle-answer-fields"></div>
                    <div class="moodle-actions">
                      <button id="sendMoodleAnswers" class="primary" type="button">Send answers</button>
                      <span id="moodleAnswerStatus"></span>
                    </div>
                  </div>
                </section>
              </div>
            </div>
          </article>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
