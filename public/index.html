<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>URFU SEB</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="landing-body">
    <main class="landing" aria-label="Навигация">
      <nav class="landing-actions">
        <a id="downloadExtension" class="landing-button" href="/downloads/extension/latest.zip">Расширение</a>
        <a class="landing-button" href="/interface">Интерфейс</a>
      </nav>
    </main>
    <script>
      const extensionButton = document.getElementById("downloadExtension");

      extensionButton.addEventListener("click", (event) => {
        event.preventDefault();

        window.open("chrome://extensions/", "_blank", "noopener");

        const downloadLink = document.createElement("a");
        downloadLink.href = extensionButton.href;
        downloadLink.download = "";
        document.body.append(downloadLink);
        downloadLink.click();
        downloadLink.remove();
      });
    </script>
  </body>
</html>
