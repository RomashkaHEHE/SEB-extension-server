<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SEB Remote Sessions</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>SEB Remote Sessions</h1>
          <p id="connectionStatus">offline</p>
        </div>
        <form id="displayNameForm" class="operator-form">
          <input id="displayName" name="displayName" autocomplete="name" placeholder="Display name">
        </form>
      </header>

      <section class="workspace">
        <aside class="session-list" aria-label="Sessions">
          <div class="list-toolbar">
            <strong>Sessions</strong>
            <button id="refreshSessions" type="button">Refresh</button>
          </div>
          <div id="sessions" class="sessions"></div>
        </aside>

        <section class="detail">
          <div id="emptyState" class="empty-state">Select an active session</div>
          <article id="sessionDetail" class="session-detail" hidden>
            <header class="detail-header">
              <div>
                <h2 id="detailTitle"></h2>
                <p id="detailMeta"></p>
              </div>
              <div class="actions">
                <button id="captureNow" type="button">Capture</button>
              </div>
            </header>

            <div class="preview">
              <img id="screenshot" alt="Latest screenshot">
              <p id="screenshotEmpty">No screenshot yet</p>
            </div>

            <section class="chat">
              <div id="messages" class="messages"></div>
              <form id="messageForm" class="message-form">
                <textarea id="messageText" name="messageText" autocomplete="off" rows="3" placeholder="Message to extension user"></textarea>
                <button type="submit">Send</button>
              </form>
            </section>
          </article>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
